name: Parquet Data Hub Sync
on:
  push:
    paths:
      - 'raw/**'
      - 'editable/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install polars pyarrow

      - name: Run Sync Script
        run: python scripts/sync.py

      - name: Commit and Push
        run: |
          git config --local user.email "hub-action@github.com"
          git config --local user.name "DataHub Bot"
          git add editable/ exports/
          git commit -m "Automated Sync: Updated Editables/Exports [skip ci]" || echo "No changes to commit"
          git push
