name: "Data Operations Hub"

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: 'Richtung wählen:'
        required: true
        default: 'to_editable'
        type: choice
        options:
          - to_editable
          - to_export

# DAS HIER FEHLTE:
permissions:
  contents: write

jobs:
  run_op:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Sicherstellen, dass wir den Token mit Schreibrechten nutzen
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Polars
        run: pip install polars pyarrow

      - name: Execute Sync
        run: python scripts/sync.py ${{ github.event.inputs.action_type }}

      - name: Commit Changes
        run: |
          git config --local user.email "hub-action@github.com"
          git config --local user.name "DataHub Bot"
          git add editable/ exports/
          git commit -m "Manual Sync: ${{ github.event.inputs.action_type }}" || echo "Nothing to commit"
          git push
